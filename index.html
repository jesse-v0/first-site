<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>omocha — thought dump</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PIN SCREEN -->
  <div id="pin-screen">
    <div class="pin-wrap">
      <div class="pin-title">omocha</div>
      <div class="pin-sub">思考の貯蔵庫</div>
      <div class="pin-dots">
        <span class="dot" id="d0"></span>
        <span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span>
        <span class="dot" id="d3"></span>
      </div>
      <div class="pin-pad">
        <button class="key" data-val="1">1</button>
        <button class="key" data-val="2">2</button>
        <button class="key" data-val="3">3</button>
        <button class="key" data-val="4">4</button>
        <button class="key" data-val="5">5</button>
        <button class="key" data-val="6">6</button>
        <button class="key" data-val="7">7</button>
        <button class="key" data-val="8">8</button>
        <button class="key" data-val="9">9</button>
        <button class="key key-blank"></button>
        <button class="key" data-val="0">0</button>
        <button class="key key-del" id="pin-del">⌫</button>
      </div>
      <div class="pin-error" id="pin-error">incorrect</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">

    <header>
      <div class="header-left">
        <span class="logo">omocha</span>
        <span class="logo-jp">おもちゃ</span>
      </div>
      <div class="flotsam-counter" id="flotsam-counter">— thoughts</div>
    </header>

    <main>
      <section class="input-section">
        <textarea
          id="thought-input"
          placeholder="dump it here."
          maxlength="280"
          rows="3"
        ></textarea>
        <div class="input-meta">
          <span class="char-count" id="char-count">280</span>
          <button id="submit-btn">deposit</button>
        </div>
      </section>

      <section class="claude-section">
        <div class="claude-row">
          <button id="synthesize-btn">what's on my mind?</button>
          <div class="query-wrap">
            <input type="text" id="query-input" placeholder="ask anything about your thoughts..." />
            <button id="query-btn">→</button>
          </div>
        </div>
        <div id="claude-output" class="claude-output hidden"></div>
      </section>

      <section class="feed-section">
        <div id="thought-feed"></div>
      </section>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
