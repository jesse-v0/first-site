<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, Cunts — coming soon</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: #1f2937;
      }

      main {
        padding: 2rem 2.5rem;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .soon {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.35rem 0.75rem;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #4338ca;
        background: rgba(99, 102, 241, 0.12);
        border-radius: 999px;
      }

      .blurb {
        margin: 1.25rem 0 0;
        max-width: 28rem;
        font-size: 1rem;
        line-height: 1.6;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, Cunts</h1>
      <p class="soon">Coming soon</p>
      <p class="blurb">
        This will be a personal catch-all for whatever random thought crosses your mind. Create an
        account, dump your thoughts, and this web app will organize them for you.
      </p>
    </main>
  </body>
</html>
